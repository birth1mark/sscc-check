<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com 'unsafe-inline';
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        font-src https://fonts.gstatic.com;
        img-src 'self' data:;
        connect-src 'self' https://sscc.birth1mark.workers.dev https://unpkg.com;
        media-src 'self' blob:;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';
    ">

    <title>SSCC Pro Vision</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 12px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 18px; border: 1px solid var(--border); }
        header { text-align: center; margin-bottom: 14px; }
        h1 { font-size: 18px; margin: 0; }
        h1 span { color: var(--primary); }
        #viewport-wrap { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; border: 2px solid var(--primary); margin-bottom: 10px; background: #000; position: relative; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        textarea { width: 100%; height: 100px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; box-sizing: border-box; }
        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .main-btn { width: 100%; padding: 13px; border-radius: 10px; font-weight: 700; border: none; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-live { background: var(--primary); }
        .btn-audit { background: #334155; }
        .btn-clear { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .results { background: #0f172a; border-radius: 10px; padding: 6px; border: 1px solid var(--border); min-height: 40px; }
        .drop-zone { width: 100%; border: 1.5px dashed var(--border); border-radius: 10px; padding: 12px; color: var(--text-muted); font-size: 12px; cursor: pointer; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <header><h1><span>SSCC</span> PRO VISION</h1></header>
        <div id="viewport-wrap"><video id="video" autoplay muted playsinline></video></div>
        <textarea id="input" placeholder="Waiting for input..."></textarea>
        <div id="drop-zone" class="drop-zone">Drop file or click to browse</div>
        <input type="file" id="file-input" style="display:none">
        <div id="file-banner" style="display:none; padding:8px; font-size:11px; background:rgba(59,130,246,0.1); margin-bottom:10px;"></div>
        <div class="btn-stack">
            <button class="main-btn btn-live" onclick="toggleScanner()">START SCANNER</button>
            <div class="btn-grid">
                <button class="main-btn btn-audit" onclick="process()">AUDIT</button>
                <button class="main-btn btn-clear" onclick="clearAll()">CLEAR</button>
            </div>
        </div>
        <div class="results" id="output"></div>
    </main>
</div>

<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="app.js"></script>
<script src="scanner.js"></script>
<script src="parser.js"></script>
<script src="init.js"></script>

</body>
</html>
