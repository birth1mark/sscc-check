<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSCC Pro Vision | Precision Scan v4.4</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444;
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--border); }
        
        header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 22px; font-weight: 700; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--primary); }

        #reader { 
            width: 100% !important; 
            border-radius: 16px; 
            overflow: hidden; 
            display: none; 
            border: 2px solid var(--primary) !important;
            background: #000;
            margin-bottom: 15px;
        }
        
        /* Botão de Captura - Estilo Industrial */
        #captureBtn {
            display: none;
            width: 100%;
            padding: 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        textarea { width: 100%; height: 100px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .main-btn { padding: 15px; border-radius: 12px; font-weight: 700; font-size: 12px; border: none; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-open { background: var(--primary); grid-column: span 2; font-size: 14px; margin-bottom: 5px; }
        .btn-audit { background: #334155; }
        .btn-clear { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .results { margin-top: 20px; background: #0f172a; border-radius: 12px; padding: 10px; border: 1px solid var(--border); max-height: 250px; overflow-y: auto; }
        .result-row { padding: 10px; border-bottom: 1px solid #1e293b; font-family: 'JetBrains Mono', monospace; font-size: 13px; display: flex; justify-content: space-between; }
        .error-digit { color: var(--danger); font-weight: 700; text-decoration: underline; }

        details { margin-top: 15px; font-size: 11px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <header>
            <h1><span>SSCC</span> PRO VISION <small style="opacity:0.5; font-size: 10px;">v4.4</small></h1>
        </header>

        <div id="reader"></div>
        
        <button id="captureBtn" onclick="scanNow()">SCAN CURRENT FRAME</button>
        
        <textarea id="input" placeholder="Codes appear here..."></textarea>

        <nav class="actions">
            <button class="main-btn btn-open" id="toggleBtn" onclick="toggleCamera()">OPEN CAMERA</button>
            <button class="main-btn btn-audit" onclick="process()">RUN AUDIT</button>
            <button class="main-btn btn-clear" onclick="clearAll()">CLEAR</button>
        </nav>

        <div class="results" id="output"></div>

        <details>
            <summary>Changelog</summary>
            <p><strong>v4.4:</strong> Improved manual scan. The button now forces an immediate scan of the current video frame to resolve "indefinite reading" issues.</p>
        </details>
    </main>
</div>

<script>
    const countries = { '560': 'PORTUGAL 🇵🇹', '840': 'SPAIN 🇪🇸' };
    let store = [];
    let html5QrCode;

    function getCD(s17) {
        let sum = 0;
        let d = s17.split('').reverse();
        for (let i = 0; i < d.length; i++) sum += parseInt(d[i]) * (i % 2 === 0 ? 3 : 1);
        return (10 - (sum % 10)) % 10;
    }

    async function toggleCamera() {
        const reader = document.getElementById('reader');
        const capBtn = document.getElementById('captureBtn');
        const togBtn = document.getElementById('toggleBtn');

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
            reader.style.display = 'block';
            capBtn.style.display = 'block';
            togBtn.innerText = "CLOSE CAMERA";
            togBtn.style.background = "var(--danger)";

            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    // Se ele ler sozinho, óptimo, processa logo.
                    handleDecodedText(decodedText);
                }
            );
        } else {
            closeCamera();
        }
    }

    // Função que força a leitura no momento do clique
    function scanNow() {
        if (html5QrCode) {
            // Tentamos obter o frame atual através do elemento video
            const video = document.querySelector('#reader video');
            if (video) {
                html5QrCode.scanFile(video, false)
                    .then(decodedText => {
                        handleDecodedText(decodedText);
                    })
                    .catch(err => {
                        alert("Could not find a clear code in this frame. Adjust focus.");
                    });
            }
        }
    }

    function handleDecodedText(text) {
        let clean = text.replace(/\D/g, '');
        if (clean.length >= 17) {
            if (clean.length > 18) clean = clean.substring(clean.length - 18);
            document.getElementById('input').value += (document.getElementById('input').value ? '\n' : '') + clean;
            if (navigator.vibrate) navigator.vibrate(100);
            closeCamera();
            process();
        }
    }

    async function closeCamera() {
        if (html5QrCode) {
            await html5QrCode.stop();
            html5QrCode = null;
            document.getElementById('reader').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('toggleBtn').innerText = "OPEN CAMERA";
            document.getElementById('toggleBtn').style.background = "var(--primary)";
        }
    }

    function process() {
        const lines = document.getElementById('input').value.split('\n');
        store = [];
        lines.forEach(line => {
            let val = line.trim().replace(/\D/g, '');
            if (val.length === 18) {
                let b = val.substring(0, 17), p = parseInt(val[17]), e = getCD(b);
                let ok = p === e;
                store.push({c: ok ? `(00)${b}${p}` : `(00)${b}<span class="error-digit">${p}</span>`, r: ok ? `PASS: ${countries[b.substring(1,4)] || "GLOBAL"}` : `FAIL: ${p} vs ${e}`, status: ok ? 'valid' : 'invalid'});
            } else if (val.length === 17) {
                store.push({c: `(00)${val}${getCD(val)}`, r: `GEN: ${countries[val.substring(1,4)] || "GLOBAL"}`, status: 'gen'});
            }
        });
        render();
    }

    function render() {
        const out = document.getElementById('output');
        out.innerHTML = store.map(i => `<div class="result-row" style="${i.status === 'invalid' ? 'color:#f87171' : ''}"><span>${i.c}</span><span style="font-size:10px; opacity:0.7">${i.r}</span></div>`).join('') || "Ready.";
    }

    function clearAll() { document.getElementById('input').value = ""; store = []; render(); }
</script>
</body>
</html>
