<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSCC Pro Vision | Industrial Scanner v4.1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #fbbf24;
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; padding-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); border: 1px solid var(--border); margin-bottom: 20px; }
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
        h1 span { color: var(--primary); }
        
        /* FIX DA CÂMARA */
        #reader { 
            width: 100% !important; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            display: none; 
            border: 2px solid var(--primary) !important;
            background: #000;
        }
        #reader video {
            width: 100% !important;
            height: auto !important;
            object-fit: cover !important; /* Evita que a imagem estique */
            border-radius: 10px;
        }
        
        textarea { width: 100%; height: 140px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 18px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 14px; margin-bottom: 25px; box-sizing: border-box; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 35px; }
        button { padding: 14px; border-radius: 10px; font-weight: 600; font-size: 11px; cursor: pointer; border: none; color: white; text-transform: uppercase; transition: 0.2s; }
        .btn-scan { background: var(--success); }
        .btn-primary { background: var(--primary); }
        .btn-secondary { background: #334155; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .results { background: #0f172a; border-radius: 14px; padding: 25px; border: 1px solid var(--border); max-height: 450px; overflow-y: auto; }
        .result-row { font-family: 'JetBrains Mono', monospace; padding: 10px 0; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
        .tag { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; margin-right: 10px; }
        .error-digit { color: var(--danger); font-weight: 700; text-decoration: underline; }
        
        .info-panel { background: rgba(15, 23, 42, 0.5); border-radius: 12px; border: 1px solid var(--border); padding: 25px; font-size: 13px; line-height: 1.6; }
        details { cursor: pointer; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 15px; }
        summary { font-weight: 700; color: var(--text-muted); outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
        summary::after { content: '＋'; font-size: 18px; color: var(--primary); }
        details[open] summary::after { content: '－'; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <header>
            <h1><span>SSCC</span> PRO VISION</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Industrial Scanner v4.1</p>
        </header>

        <div id="reader"></div>
        <textarea id="input" spellcheck="false" placeholder="Scan or enter logistics data..."></textarea>

        <nav class="actions">
            <button class="btn-scan" id="scanBtn" onclick="toggleScanner()">Camera Scan</button>
            <button class="btn-primary" onclick="process()">Run Audit</button>
            <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
            <button class="btn-danger" onclick="clearAll()">Reset</button>
        </nav>

        <div class="results" id="output">
            <div style="color: #475569; text-align: center;">System ready.</div>
        </div>
    </main>

    <section class="info-panel">
        <details>
            <summary>Changelog & Documentation</summary>
            <div style="color: var(--text-muted); padding-top: 10px;">
                <p><strong>v4.1:</strong> Fixed aspect ratio issues on mobile. Added <code>object-fit: cover</code> to prevent video stretching.</p>
                <p><strong>v4.0:</strong> Industrial UI update. Smart auto-dismiss scanner.</p>
            </div>
        </details>
    </section>
</div>

<script>
    const countries = { '560': 'PORTUGAL 🇵🇹', '840': 'SPAIN 🇪🇸' };
    let store = [];
    let html5QrCode;

    function getCD(s17) {
        let sum = 0;
        let d = s17.split('').reverse();
        for (let i = 0; i < d.length; i++) sum += parseInt(d[i]) * (i % 2 === 0 ? 3 : 1);
        return (10 - (sum % 10)) % 10;
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                html5QrCode = null;
                document.getElementById('reader').style.display = 'none';
                document.getElementById('scanBtn').innerText = "Camera Scan";
            }).catch(err => console.warn(err));
        }
    }

    function toggleScanner() {
        const readerDiv = document.getElementById('reader');
        const btn = document.getElementById('scanBtn');
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
            readerDiv.style.display = 'block';
            btn.innerText = "Stop Scan";
            
            // Configuração refinada do scanner
            const config = { 
                fps: 20, 
                qrbox: { width: 280, height: 180 },
                aspectRatio: 1.0 // Força um rácio quadrado/controlado
            };

            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                let clean = text.replace(/\D/g, '');
                if (clean.length >= 17) {
                    if (clean.length > 18) clean = clean.substring(clean.length - 18);
                    document.getElementById('input').value += (document.getElementById('input').value ? '\n' : '') + clean;
                    stopScanner();
                    process();
                }
            }).catch(err => console.error(err));
        } else {
            stopScanner();
        }
    }

    function process() {
        const input = document.getElementById('input').value;
        const lines = input.split('\n');
        store = [];
        lines.forEach(line => {
            let clean = line.trim().replace(/\D/g, '');
            if (clean.length === 18) {
                let b = clean.substring(0, 17), p = parseInt(clean[17]), e = getCD(b);
                let ok = p === e;
                store.push({c: ok ? `(00)${b}${p}` : `(00)${b}<span class="error-digit">${p}</span>`, r: ok ? `PASS: ${countries[b.substring(1,4)] || "GLOBAL"}` : `FAIL: ${p} should be ${e}`, status: ok ? 'valid' : 'invalid'});
            } else if (clean.length === 17) {
                store.push({c: `(00)${clean}${getCD(clean)}`, r: `GEN: ${countries[clean.substring(1,4)] || "GLOBAL"}`, status: 'gen'});
            }
        });
        render();
    }

    function render() {
        const out = document.getElementById('output');
        out.innerHTML = store.map(i => `
            <div class="result-row" style="${i.status === 'invalid' ? 'color:#f87171' : ''}">
                <span>${i.status !== 'gen' ? `<span class="tag" style="background:${i.status === 'valid' ? 'rgba(16,185,129,0.2);color:#34d399' : 'rgba(239,68,68,0.2);color:#f87171'}">${i.status === 'valid' ? 'OK' : 'ERR'}</span>` : ''}${i.c}</span>
                <span class="tag tag-country">${i.r}</span>
            </div>
        `).join('') || '<div style="text-align: center; color: #475569;">No data found.</div>';
    }

    function exportCSV() {
        let csv = "SSCC,Verdict\n" + store.map(i => `"${i.c.replace(/<[^>]*>/g, '')}","${i.r}"`).join("\n");
        let blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8' });
        let a = document.createElement('a'); a.href = window.URL.createObjectURL(blob);
        a.download = "Audit_Report.csv"; a.click();
    }

    function clearAll() { document.getElementById('input').value = ""; store = []; render(); }
</script>
</body>
</html>
