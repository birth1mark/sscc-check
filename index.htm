<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSCC Pro Vision | Final Scan Suite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444;
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; padding-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); border: 1px solid var(--border); margin-bottom: 20px; }
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 700; margin: 0; }
        h1 span { color: var(--primary); }
        
        /* Scanner UI */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 20px; display: none; border: 2px solid var(--primary) !important; background: #000; min-height: 250px; }
        
        textarea { width: 100%; height: 160px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 18px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 14px; margin-bottom: 25px; box-sizing: border-box; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 35px; }
        button { padding: 14px; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer; border: none; color: white; text-transform: uppercase; transition: 0.2s; }
        .btn-scan { background: var(--success); }
        .btn-primary { background: var(--primary); }
        .btn-secondary { background: #334155; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .results { background: #0f172a; border-radius: 14px; padding: 25px; border: 1px solid var(--border); max-height: 450px; overflow-y: auto; }
        .result-row { font-family: 'JetBrains Mono', monospace; padding: 10px 0; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; font-size: 14px; }
        .tag { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; margin-right: 10px; }
        .error-digit { color: var(--danger); font-weight: 700; text-decoration: underline; }
        
        details { cursor: pointer; border-top: 1px solid var(--border); padding: 25px; margin-top: 15px; background: rgba(15, 23, 42, 0.5); border-radius: 12px; }
        summary { font-weight: 700; color: var(--text-muted); outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
        summary::after { content: '＋'; }
        details[open] summary::after { content: '－'; }
        .changelog p { margin: 8px 0; border-left: 2px solid var(--border); padding-left: 10px; font-size: 12px; color: var(--text-muted); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <header>
            <h1><span>SSCC</span> PRO VISION</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Strict Compliance Engine v3.8</p>
        </header>

        <div id="reader"></div>
        <textarea id="input" spellcheck="false" placeholder="Scan label or paste data..."></textarea>

        <nav class="actions">
            <button class="btn-scan" id="scanBtn" onclick="toggleScanner()">Camera Scan</button>
            <button class="btn-primary" onclick="process()">Run Audit</button>
            <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
            <button class="btn-danger" onclick="clearAll()">Reset</button>
        </nav>

        <div class="results" id="output">
            <div style="color: #475569; text-align: center;">Awaiting logistics data.</div>
        </div>
    </main>

    <details>
        <summary>System Logs & Info</summary>
        <div class="changelog">
            <p><span style="color: var(--success); font-weight: 700;">v3.8</span> <strong>Scanner Overhaul:</strong> Removed scan-box constraints for better Barcode detection. Added forced auto-kill on successful read.</p>
            <p><span style="color: var(--success); font-weight: 700;">v3.7</span> <strong>Auto-Dismiss:</strong> Camera terminates immediately upon detection.</p>
        </div>
    </details>
</div>

<script>
    const countries = { '560': 'PORTUGAL 🇵🇹', '840': 'SPAIN 🇪🇸', '300': 'FRANCE 🇫🇷', '400': 'GERMANY 🇩🇪' };
    let store = [];
    let scanner = null;

    function getCD(s17) {
        let sum = 0;
        let d = s17.split('').reverse();
        for (let i = 0; i < d.length; i++) sum += parseInt(d[i]) * (i % 2 === 0 ? 3 : 1);
        return (10 - (sum % 10)) % 10;
    }

    async function toggleScanner() {
        const btn = document.getElementById('scanBtn');
        const readerDiv = document.getElementById('reader');

        if (scanner) {
            await stopScanner();
            return;
        }

        readerDiv.style.display = 'block';
        btn.innerText = "Stop Scanner";
        btn.style.background = "var(--danger)";

        scanner = new Html5Qrcode("reader");
        
        const config = { 
            fps: 20, 
            aspectRatio: 1.777778 // Wide aspect ratio for barcodes
        };

        scanner.start(
            { facingMode: "environment" }, 
            config,
            async (text) => {
                // STOP IMMEDIATELY
                await stopScanner();
                
                let clean = text.replace(/\D/g, '');
                if (clean.length > 18) clean = clean.substring(clean.length - 18);
                
                if (clean.length >= 17) {
                    const field = document.getElementById('input');
                    field.value += (field.value ? '\n' : '') + clean;
                    process();
                }
            }
        ).catch(err => {
            alert("Camera Access Error: Ensure you are on HTTPS and granted permissions.");
            stopScanner();
        });
    }

    async function stopScanner() {
        if (scanner) {
            try {
                await scanner.stop();
            } catch (e) {
                console.warn(e);
            }
            scanner = null;
        }
        document.getElementById('reader').style.display = 'none';
        document.getElementById('scanBtn').innerText = "Camera Scan";
        document.getElementById('scanBtn').style.background = "var(--success)";
    }

    function process() {
        const input = document.getElementById('input').value;
        const lines = input.split('\n');
        store = [];

        lines.forEach(line => {
            let cleanLine = line.trim().replace(/\s*-\s*/, ' ');
            let parts = cleanLine.split(/\s+/).filter(p => p.length > 5);

            if (parts.length === 2) {
                let sRaw = parts[0].replace(/\D/g, ''), eRaw = parts[1].replace(/\D/g, '');
                [sRaw, eRaw].forEach(val => {
                    if (val.length === 18) {
                        let b = val.substring(0, 17), p = parseInt(val[17]), e = getCD(b);
                        if (p !== e) store.push({c: `(00)${b}<span class="error-digit">${p}</span>`, r: `FAIL: ${p} should be ${e}`, status: 'invalid'});
                    }
                });
                let s17 = sRaw.substring(0, 17).padStart(17, '0'), e17 = eRaw.substring(0, 17).padStart(17, '0');
                try {
                    let s = BigInt(s17), e = BigInt(e17);
                    if (s > e) [s, e] = [e, s];
                    for (let i = s; i <= e; i++) {
                        let b = i.toString().padStart(17, '0');
                        store.push({c: `(00)${b}${getCD(b)}`, r: `PASS: ${countries[b.substring(1,4)] || "GLOBAL"}`, status: 'gen'});
                    }
                } catch(err) {}
            } else if (parts.length === 1) {
                let val = parts[0].replace(/\D/g, '');
                if (val.length === 18) {
                    let b = val.substring(0, 17), p = parseInt(val[17]), e = getCD(b);
                    let ok = p === e;
                    let disp = ok ? `(00)${b}${p}` : `(00)${b}<span class="error-digit">${p}</span>`;
                    store.push({c: disp, r: ok ? `PASS: ${countries[b.substring(1,4)] || "GLOBAL"}` : `FAIL: ${p} should be ${e}`, status: ok ? 'valid' : 'invalid'});
                } else if (val.length === 17) {
                    store.push({c: `(00)${val}${getCD(val)}`, r: `GEN: ${countries[val.substring(1,4)] || "GLOBAL"}`, status: 'gen'});
                }
            }
        });
        render();
    }

    function render() {
        const out = document.getElementById('output');
        out.innerHTML = store.map(i => `
            <div class="result-row" style="${i.status === 'invalid' ? 'color:#f87171' : ''}">
                <span>${i.status !== 'gen' ? `<span class="tag" style="background:${i.status === 'valid' ? 'rgba(16,185,129,0.2);color:#34d399' : 'rgba(239,68,68,0.2);color:#f87171'}">${i.status === 'valid' ? 'OK' : 'ERR'}</span>` : ''}${i.c}</span>
                <span class="tag tag-country">${i.r}</span>
            </div>
        `).join('') || '<div style="text-align: center; color: #475569;">No results yet.</div>';
    }

    function exportCSV() {
        let csv = "SSCC,Verdict\n" + store.map(i => `"${i.c.replace(/<[^>]*>/g, '')}","${i.r}"`).join("\n");
        let blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8' });
        let a = document.createElement('a'); a.href = window.URL.createObjectURL(blob);
        a.download = "SSCC_Audit.csv"; a.click();
    }

    function clearAll() { document.getElementById('input').value = ""; store = []; render(); }
</script>
</body>
</html>
