<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com 'unsafe-inline';
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        font-src https://fonts.gstatic.com;
        img-src 'self' data:;
        connect-src 'self' https://sscc.birth1mark.workers.dev https://unpkg.com;
        media-src 'self' blob:;
        worker-src 'self';
        base-uri 'self';
        form-action 'self';
    ">

    <title>SSCC Validator & Check Digit Calculator | SSCC Pro Vision</title>
    <meta name="description" content="Free SSCC validator, check digit calculator and REST API. Scan GS1-128 barcodes, validate SSCC codes, generate check digits, and extract from EDIFACT files.">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary:    #3b82f6;
            --success:    #10b981;
            --danger:     #ef4444;
            --bg:         #0f172a;
            --card-bg:    #1e293b;
            --text-main:  #f8fafc;
            --text-muted: #94a3b8;
            --border:     #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 12px;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; padding-bottom: 24px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px; padding: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        header { margin-bottom: 14px; text-align: center; }
        h1 { font-size: 18px; font-weight: 700; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--primary); }

        #viewport-wrap {
            width: 100%; height: 220px;
            border-radius: 16px; overflow: hidden;
            border: 2px solid var(--primary);
            margin-bottom: 10px;
            background: #000; position: relative; display: none;
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .btn-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .main-btn {
            width: 100%; padding: 13px; border-radius: 10px;
            font-weight: 700; font-size: 13px;
            border: none; color: white; cursor: pointer;
            text-transform: uppercase; transition: opacity 0.2s;
        }
        .btn-live  { background: var(--primary); }
        .btn-audit { background: #334155; }
        .btn-clear { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

        textarea {
            width: 100%; height: 100px;
            background: #0f172a; border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
            margin-bottom: 10px; box-sizing: border-box; resize: vertical;
        }

        .results {
            background: #0f172a; border-radius: 10px;
            padding: 6px; border: 1px solid var(--border);
            max-height: 300px; overflow-y: auto;
        }

        .drop-zone {
            width: 100%; box-sizing: border-box;
            border: 1.5px dashed var(--border); border-radius: 10px;
            padding: 10px 14px; margin-bottom: 10px;
            color: var(--text-muted); font-size: 12px;
            cursor: pointer; transition: border-color 0.2s, background 0.2s;
            display: flex; align-items: center;
        }

        .file-banner {
            display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
            font-size: 12px; margin-bottom: 10px;
            padding: 8px 12px; border-radius: 8px;
            background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <header>
            <h1><span>SSCC</span> PRO VISION <small style="opacity:0.5; font-size:10px;">v5.5.3</small></h1>
        </header>

        <div id="viewport-wrap">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <textarea id="input" placeholder="Waiting for scan or manual input..." inputmode="numeric"></textarea>

        <div id="drop-zone" class="drop-zone">
            <i data-lucide="upload" style="width:18px;height:18px;margin-right:8px;opacity:0.6;"></i>
            <span>Drop file or <u>browse</u> — EDIFACT, XML, CSV, TXT</span>
            <input type="file" id="file-input" style="display:none;">
        </div>
        <div id="file-banner" class="file-banner" style="display:none;"></div>

        <div class="btn-stack">
            <button class="main-btn btn-live" id="btnToggle" onclick="toggleScanner()">START SCANNER</button>
            <div class="btn-grid">
                <button class="main-btn btn-audit" onclick="process()">AUDIT</button>
                <button class="main-btn btn-clear" onclick="clearAll()">CLEAR</button>
            </div>
        </div>

        <div class="results" id="output">
            <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">
                Scan a barcode or enter an SSCC
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>

<script src="app.js"></script>
<script src="scanner.js"></script>
<script src="parser.js"></script>
<script src="init.js"></script>

</body>
</html>
